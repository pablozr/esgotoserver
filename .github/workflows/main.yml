name: Move Assigned Issue to In Progress

on:
  issues:
    types: [assigned]

jobs:
  move-to-in-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: alex-page/github-project-automation-plus@v0.8.3
        with:
          project: "TODO's"  
          column: "Em progresso"
          repo-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
